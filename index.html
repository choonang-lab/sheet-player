<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sheet Player — jianpu + chords</title>
<style>html,body{margin:0;background:#0f1115}</style>
</head>
<body>
<!-- The whole player is the SheetPlayer module (player.js), mounted here.
     Engine + UI + scoped styles all come from the module; song/strum/chord data
     from the shared ruyan-song.js. This file is just the shell. -->
<div id="app"></div>
<script src="ruyan-song.js"></script>
<script src="player.js"></script>
<script>SheetPlayer.mount(document.getElementById("app"), {hash:true});</script>
</body>
</html>
